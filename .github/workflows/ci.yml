name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  database:
    name: Database tests (pgTAP)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local stack
        run: supabase start
        working-directory: .

      - name: Run pgTAP tests
        run: supabase test db
        working-directory: .

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
        working-directory: .

  edge-functions:
    name: Edge Function Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Lint shared modules
        working-directory: supabase/functions
        run: deno lint _shared/

      - name: Type-check all functions
        working-directory: supabase/functions
        run: |
          deno check _shared/*.ts
          deno check health/index.ts
          deno check review/index.ts
          deno check unlock-check/index.ts
          deno check report/index.ts
          deno check webhook-revenuecat/index.ts
          deno check delete-account/index.ts
          deno check export-account/index.ts

      - name: Run unit tests
        working-directory: supabase/functions
        run: deno test _shared/ --allow-none
