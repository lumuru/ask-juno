name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  database:
    name: Database tests (pgTAP)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local stack
        run: supabase start
        working-directory: .

      - name: Run pgTAP tests
        run: supabase test db
        working-directory: .

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
        working-directory: .
